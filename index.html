<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Gerador de Carimbo - Reparo</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { background: #E3C6E3; font-family: sans-serif; padding: 10px; }
    .container { max-width: 400px; margin: auto; background: #fff3; border-radius: 10px; padding: 15px 15px 30px 15px; position: relative; }
    label { font-weight: bold; display: block; margin-top: 10px; margin-bottom: 3px; }
    textarea { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem; box-sizing: border-box; resize: none; overflow: hidden; min-height: 40px; font-family: sans-serif; margin-bottom: 10px; }
    button { background: #ffe900; color: #222; font-weight: bold; border-radius: 8px; padding: 12px 0; width: 100%; border: none; margin-top: 12px; cursor: pointer; font-size: 1rem; }
    .actions-row { display: flex; gap: 12px; margin-top: 8px; margin-bottom: 8px; }
    .output { margin-top: 18px; background: #e0f7fa; padding: 10px; border-radius: 7px; white-space: pre-line; font-family: monospace; min-height: 100px; overflow-wrap: break-word; word-break: break-word; }
    .marca { position: absolute; bottom: 4px; left: 0; right: 0; width: 100%; text-align: center; font-size: 0.72em; color: #888; opacity: 0.6; font-family: monospace; pointer-events: none; user-select: none; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🛠️ GERADOR DE CARIMBO - REPARO</h2>
    
    <label for="causa">O que causou o defeito:</label>
    <textarea id="causa" placeholder="Digite aqui..."></textarea>

    <label for="corrigir">O que foi feito para corrigir:</label>
    <textarea id="corrigir" placeholder="Digite aqui..."></textarea>

    <label for="orientacao">Orientação al cliente (opcional):</label>
    <textarea id="orientacao" placeholder="Digite aqui..."></textarea>

    <label for="mapaCalor">Código do Mapa de Calor:</label>
    <textarea id="mapaCalor" placeholder="Digite aqui..."></textarea>

    <label for="speedTest">ID ou link do Speed Test:</label>
    <textarea id="speedTest" placeholder="Link ou ID"></textarea>

    <label for="powerMeter">Potência Fibra PowerMeter:</label>
    <textarea id="powerMeter" placeholder="Número"></textarea>

    <label for="observacoes">OBSERVAÇÕES (opcional):</label>
    <textarea id="observacoes" placeholder="Digite aqui..."></textarea>

    <div class="actions-row">
      <button id="gerar">Carimbo Zeus (Gerar e Copiar)</button>
      <button id="borrar" style="background: #ffcccb; color: #a00;">Borrar todo</button>
    </div>
    
    <div class="output" id="output"></div>
    <div class="marca">modified by Bryan Silva</div>
  </div>

  <script>
    const campos = ['causa','corrigir','orientacao','mapaCalor','speedTest','powerMeter','observacoes']
      .map(id => document.getElementById(id));

    const generar = document.getElementById('gerar');
    const borrar = document.getElementById('borrar');
    const output = document.getElementById('output');

    window.onload = function () {
      const dados = JSON.parse(localStorage.getItem('carimbo_reparo')) || {};
      campos.forEach(campo => {
        campo.value = dados[campo.id] || '';
        autoResize(campo);
        campo.addEventListener('input', () => autoResize(campo));
      });
    };

    function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

    function valorOuNA(t) { return t.trim() === "" ? "N/A" : t.trim(); }

    function validarPowerMeter(t) {
      let v = t.trim().replace(',', '.');
      if (v === '' || isNaN(v)) { alert('Potência PowerMeter inválida'); return null; }
      let n = Number(v);
      return (n > 0 ? -n : n).toString();
    }

    gerar.onclick = function () {
      // Validaciones básicas
      const idsObligatorios = ['causa', 'corrigir', 'mapaCalor', 'powerMeter'];
      for (let id of idsObligatorios) {
        if (document.getElementById(id).value.trim() === "") {
          alert("Por favor, completa los campos obligatorios");
          document.getElementById(id).focus();
          return;
        }
      }

      const pmVal = validarPowerMeter(document.getElementById('powerMeter').value);
      if (pmVal === null) return;

      // Guardar en LocalStorage
      const obj = {};
      campos.forEach(c => obj[c.id] = c.value);
      localStorage.setItem('carimbo_reparo', JSON.stringify(obj));

      const agora = new Date();
      const speedId = document.getElementById('speedTest').value.match(/(\d{7,15})/)?.[1] || "N/A";
      
      // Texto final
      const texto = `RELATÓRIO DE REPARO

;DATA HORA: ${agora.toLocaleString()};
O que causou o defeito: ${valorOuNA(document.getElementById('causa').value)};
O que foi feito para corrigir: ${valorOuNA(document.getElementById('corrigir').value)};
Orientação ao cliente: ${valorOuNA(document.getElementById('orientacao').value)};
Código do Mapa de Calor: ${valorOuNA(document.getElementById('mapaCalor').value)};
ID do Speed Test: ${speedId};
Potência Fibra PowerMeter: ${pmVal};
OBSERVAÇÕES: ${valorOuNA(document.getElementById('observacoes').value)};
`;

      output.textContent = texto;

      // --- ACCIÓN DE COPIAR AUTOMÁTICA ---
      navigator.clipboard.writeText(texto).then(() => {
        if (window.Telegram?.WebApp) {
          window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
          window.Telegram.WebApp.showAlert('✅ ¡Copiado con éxito!');
        } else {
          alert('✅ ¡Relatorio generado y copiado!');
        }
      });
    };

    borrar.onclick = function () {
      if(confirm("¿Borrar todos los campos?")) {
        campos.forEach(c => { c.value = ""; autoResize(c); });
        localStorage.removeItem('carimbo_reparo');
        output.textContent = "";
      }
    };
  </script>
</body>
</html>
